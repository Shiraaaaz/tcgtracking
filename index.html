<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Capital Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:20px}
h1{text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card h3{margin:0;font-size:14px;color:#666}
.card p{margin:8px 0 0;font-size:26px;font-weight:bold}
table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#2e7d32;color:#fff}
.pos{color:green;font-weight:bold}.neg{color:red;font-weight:bold}
</style>
</head>
<body>
<h1>TCG Capital Tracker</h1>

<div class="cards">
<div class="card"><h3>Initial Capital</h3><p id="initial">$0</p></div>
<div class="card"><h3>Capital Used</h3><p id="used">$0</p></div>
<div class="card"><h3>Capital Left</h3><p id="left">$0</p></div>
<div class="card"><h3>Total Profit</h3><p id="profit">$0</p></div>
<div class="card"><h3>Profit Margin %</h3><p id="margin">0%</p></div>
<div class="card"><h3>Total Profits</h3><p id="profits">$0</p></div>
</div>

<table>
<thead><tr>
<th>Game</th><th>Item/Card</th><th>Quantity</th><th>Cost</th><th>Sold For</th><th>Profit</th><th>Profit Margin %</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>

<script>
const csv="https://docs.google.com/spreadsheets/d/e/2PACX-1vQoDO77WEWEFUMKyDhZkAzwEVSWqC7UXq0DY2nK3Vy0ibvXrxZUt6KccOoF3eF46izMrHEG5P5E88Q0/pub?output=csv";
Papa.parse(csv,{
download:true,header:true,
complete:r=>{
let rows=r.data.filter(x=>Object.values(x).some(v=>v));
let init=0,used=0,totalProfit=0,totalMargin=0,count=0;
const tb=document.getElementById("tbody");
rows.forEach(x=>{
let cost=parseFloat((x["Cost"]||"0").replace(/,/g,""))||0;
let sold=parseFloat((x["Sold for how much"]||x["Sold for how mu"]||"0").replace(/,/g,""))||0;
let initial=parseFloat((x["Initial Capital"]||"0").replace(/,/g,""))||0;
if(initial>0&&init===0)init=initial;
used+=cost;
let profit=sold-cost;
let margin=cost?profit/cost*100:0;
if(sold>0){totalProfit+=profit;totalMargin+=margin;count++;}
tb.innerHTML+=`<tr>
<td>${x["Game"]||""}</td>
<td>${x["Item/Card"]||""}</td>
<td>${x["Quantity"]||""}</td>
<td>$${cost.toLocaleString()}</td>
<td>${sold?("$"+sold.toLocaleString()):"-"}</td>
<td class="${profit>=0?"pos":"neg"}">${sold?("$"+profit.toLocaleString()):"-"}</td>
<td>${sold?margin.toFixed(2)+"%":"-"}</td>
</tr>`;
});
document.getElementById("initial").textContent="$"+init.toLocaleString();
document.getElementById("used").textContent="$"+used.toLocaleString();
document.getElementById("left").textContent="$"+(init-used).toLocaleString();
document.getElementById("profit").textContent="$"+totalProfit.toLocaleString();
document.getElementById("profits").textContent="$"+totalProfit.toLocaleString();
document.getElementById("margin").textContent=(count?totalMargin/count:0).toFixed(2)+"%";
}
});
</script>
</body>
</html>
