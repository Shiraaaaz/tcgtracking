<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Capital Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
*{box-sizing:border-box}body{margin:0;padding:24px;background:#05070a;color:#e5e7eb;font-family:Inter,sans-serif}
h1{margin:0 0 22px;color:#f59e0b;font-size:30px;font-weight:700;border-left:6px solid #f59e0b;padding-left:12px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.card{background:#101418;border:1px solid #232a31;border-radius:4px;padding:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.card h3{margin:0;color:#9ca3af;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.card p{margin:8px 0 0;font-size:32px;font-weight:700;color:#f59e0b}
table{width:100%;border-collapse:collapse;background:#0f1318;border:1px solid #2c3440}
th{background:#161b22;color:#f59e0b;padding:13px;border-bottom:2px solid #f59e0b;text-transform:uppercase;font-size:12px}
td{padding:12px;border-bottom:1px solid #232a31}
tr:hover{background:#171d24}
tr:nth-child(even){background:#11161c}
.pos{color:#22c55e;font-weight:700}.neg{color:#ef4444;font-weight:700}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h1>TCG Capital Tracker</h1>

<div class="cards">
<div class="card"><h3>Initial Capital</h3><p id="initial">$0</p></div>
<div class="card"><h3>Capital Used</h3><p id="used">$0</p></div>
<div class="card"><h3>Capital Left</h3><p id="left">$0</p></div>
<div class="card"><h3>Total Profit</h3><p id="profit">$0</p></div>
<div class="card"><h3>Profit Margin %</h3><p id="margin">0%</p></div>
<div class="card"><h3>Total Profits</h3><p id="profits">$0</p></div>
</div>


<h2 style="color:#f59e0b">Portfolio Charts</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin:20px 0;">
<canvas id="capitalChart" height="220"></canvas>
<canvas id="profitChart" height="220"></canvas>
</div>
<div style="background:#101418;padding:12px;border:1px solid #2c3440;margin-bottom:20px">
<canvas id="marginChart" height="120"></canvas>
</div>
<table>
<thead><tr>
<th>Game</th><th>Item/Card</th><th>Quantity</th><th>Cost</th><th>Sold For</th><th>Profit</th><th>Profit Margin %</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>

<script>
const csv="https://docs.google.com/spreadsheets/d/e/2PACX-1vQoDO77WEWEFUMKyDhZkAzwEVSWqC7UXq0DY2nK3Vy0ibvXrxZUt6KccOoF3eF46izMrHEG5P5E88Q0/pub?output=csv";
Papa.parse(csv,{
download:true,header:true,
complete:r=>{
let rows=r.data.filter(x=>Object.values(x).some(v=>v));
let init=0,used=0,totalProfit=0,totalMargin=0,count=0;
const tb=document.getElementById("tbody");
rows.forEach(x=>{
let cost=parseFloat((x["Cost"]||"0").replace(/,/g,""))||0;
let sold=parseFloat((x["Sold for how much"]||x["Sold for how mu"]||"0").replace(/,/g,""))||0;
let initial=parseFloat((x["Initial Capital"]||"0").replace(/,/g,""))||0;
if(initial>0&&init===0)init=initial;
used+=cost;
let profit=sold-cost;
let margin=cost?profit/cost*100:0;
if(sold>0){totalProfit+=profit;totalMargin+=margin;count++;}
tb.innerHTML+=`<tr>
<td>${x["Game"]||""}</td>
<td>${x["Item/Card"]||""}</td>
<td>${x["Quantity"]||""}</td>
<td>$${cost.toLocaleString()}</td>
<td>${sold?("$"+sold.toLocaleString()):"-"}</td>
<td class="${profit>=0?"pos":"neg"}">${sold?("$"+profit.toLocaleString()):"-"}</td>
<td>${sold?margin.toFixed(2)+"%":"-"}</td>
</tr>`;
});
document.getElementById("initial").textContent="$"+init.toLocaleString();
document.getElementById("used").textContent="$"+used.toLocaleString();
document.getElementById("left").textContent="$"+(init-used).toLocaleString();
document.getElementById("profit").textContent="$"+totalProfit.toLocaleString();
document.getElementById("profits").textContent="$"+totalProfit.toLocaleString();
document.getElementById("margin").textContent=(count?totalMargin/count:0).toFixed(2)+"%";
const labels=[],profits=[],margins=[];
rows.forEach(x=>{
 let c=parseFloat((x["Cost"]||"0").replace(/,/g,""))||0;
 let s=parseFloat((x["Sold for how much"]||x["Sold for how mu"]||"0").replace(/,/g,""))||0;
 if(s>0){
   labels.push(x["Item/Card"]||"Item");
   profits.push(s-c);
   margins.push(c?((s-c)/c*100):0);
 }
});
new Chart(document.getElementById('capitalChart'),{
type:'doughnut',
data:{labels:['Capital Used','Capital Left'],datasets:[{data:[used,init-used],backgroundColor:['#f59e0b','#374151']}]},
options:{plugins:{legend:{labels:{color:'white'}}}}
});
new Chart(document.getElementById('profitChart'),{
type:'bar',
data:{labels:labels,datasets:[{label:'Profit',data:profits,backgroundColor:'#22c55e'}]},
options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}
});
new Chart(document.getElementById('marginChart'),{
type:'line',
data:{labels:labels,datasets:[{label:'Profit Margin %',data:margins,borderColor:'#f59e0b',backgroundColor:'#f59e0b',fill:false,tension:.3}]},
options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}
});

}
});
</script>
</body>
</html>
